<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PickBros Survivor</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #eef0f2; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; color: #111; }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }
    #auth-screen.active { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #eef0f2; }

    /* ── AUTH ── */
    .auth-wrap { width: 100%; max-width: 360px; padding: 0 20px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo-text { font-size: 28px; font-weight: 900; color: #111; letter-spacing: -1px; }
    .auth-logo-text span { color: #D50A0A; }
    .auth-logo-sub { font-size: 11px; font-weight: 700; color: #9ca3af; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; }
    .auth-card { background: #fff; border-radius: 16px; padding: 24px; }
    .auth-tabs { display: flex; background: #f3f4f6; border-radius: 8px; padding: 3px; margin-bottom: 20px; }
    .auth-tab { flex: 1; padding: 8px; border: none; background: transparent; font-size: 13px; font-weight: 700; color: #9ca3af; border-radius: 6px; cursor: pointer; }
    .auth-tab.active { background: #fff; color: #111; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #111; outline: none; background: #fafafa; }
    .field input:focus { border-color: #013369; background: #fff; }
    .btn-submit { width: 100%; padding: 13px; background: #ff6b35; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; color: #fff; cursor: pointer; margin-top: 4px; }
    .auth-msg { font-size: 12px; color: #6b7280; text-align: center; margin-top: 10px; }
    .auth-msg.error { color: #D50A0A; }
    .auth-msg.success { color: #16a34a; }

    /* ── TOP NAV ── */
    .top-nav { background: rgba(255,255,255,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,.06); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 200; }
    .top-nav-logo { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: -.5px; }
    .top-nav-logo span { color: #D50A0A; }
    .top-nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.08); color: #6b7280; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .logout-btn { font-size: 11px; font-weight: 700; color: #9ca3af; background: rgba(0,0,0,.04); border: 1px solid rgba(0,0,0,.08); border-radius: 6px; padding: 4px 10px; cursor: pointer; }

    /* ── TAB BAR (estilo NFL app) ── */
    .tab-bar { background: rgba(255,255,255,.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid #e5e7eb; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item { flex: 1; min-width: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 8px 8px; font-size: 11px; font-weight: 700; color: #9ca3af; border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; gap: 3px; white-space: nowrap; }
    .tab-item.active { color: #013369; border-bottom-color: #D50A0A; }
    .tab-icon { font-size: 18px; }

    /* ── MAIN ── */
    .main { padding: 14px 12px 110px; max-width: 600px; margin: 0 auto; }
    .page { display: none; }
    .page.active { display: block; }

    /* ── SECTION HEADER (estilo "Recently Completed") ── */
    .section-header { font-size: 18px; font-weight: 800; color: #111; margin: 16px 0 10px; letter-spacing: -.3px; }

    /* ── GAME CARD — split color exacto como NFL app ── */
    .game-card { border-radius: 12px; overflow: hidden; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.10); }
    .game-split { display: flex; height: 88px; }
    .team-side { flex: 1; display: flex; align-items: center; padding: 0 14px; gap: 10px; position: relative; }
    .team-side.away { flex-direction: row; }
    .team-side.home { flex-direction: row-reverse; }
    .t-logo { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
    .t-info { display: flex; flex-direction: column; }
    .team-side.home .t-info { align-items: flex-end; }
    .t-abbr { font-size: 15px; font-weight: 900; color: #fff; letter-spacing: .5px; text-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .t-record { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.65); }
    .t-score { font-size: 36px; font-weight: 900; color: #fff; line-height: 1; margin: 0 10px; text-shadow: 0 1px 4px rgba(0,0,0,.25); }
    .t-score.dim { color: rgba(255,255,255,.38); }
    .split-divider { width: 1px; background: rgba(255,255,255,.18); flex-shrink: 0; }
    .game-footer { background: rgba(15,15,20,.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; padding: 7px 14px; gap: 10px; }
    .gf-final { font-size: 11px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: .5px; }
    .gf-sep { width: 1px; height: 12px; background: rgba(255,255,255,.2); }
    .gf-date { font-size: 11px; color: rgba(255,255,255,.45); font-weight: 600; }
    .gf-badge { margin-left: auto; font-size: 10px; font-weight: 700; color: #f59e0b; background: rgba(245,158,11,.12); padding: 3px 8px; border-radius: 20px; }

    /* ── STAT CARDS (3 en fila) ── */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { background: rgba(255,255,255,.72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.5); border-radius: 12px; padding: 14px 10px; text-align: center; }
    .stat-n { font-size: 28px; font-weight: 900; color: #013369; line-height: 1; }
    .stat-l { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

    /* ── MI PICK CARD ── */
    .pick-card { background: rgba(255,255,255,.75); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.5); border-radius: 12px; overflow: hidden; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .pick-card-header { background: #013369; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
    .pick-card-week { font-size: 11px; font-weight: 800; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: 1px; }
    .pick-card-deadline { font-size: 11px; font-weight: 700; color: #f59e0b; }
    .pick-card-body { padding: 16px; }
    .pick-prompt { font-size: 12px; font-weight: 600; color: #9ca3af; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }

    /* confirmed pick */
    .confirmed-row { display: flex; align-items: center; gap: 14px; }
    .conf-logo { width: 56px; height: 56px; object-fit: contain; }
    .conf-name { font-size: 20px; font-weight: 900; color: #111; }
    .conf-result { font-size: 12px; font-weight: 700; margin-top: 3px; }
    .conf-result.win { color: #16a34a; }
    .conf-result.loss { color: #D50A0A; }
    .conf-result.pending { color: #9ca3af; }
    .change-btn { margin-left: auto; font-size: 12px; font-weight: 700; color: #6b7280; background: #f3f4f6; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; }

    /* ── TEAM PICKER GRID ── */
    .team-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    @media(min-width:420px){ .team-grid { grid-template-columns: repeat(5,1fr); } }
    @media(min-width:520px){ .team-grid { grid-template-columns: repeat(6,1fr); } }
    .t-btn { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 10px; padding: 8px 4px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: border-color .15s, background .15s; }
    .t-btn:active { transform: scale(.96); }
    .t-btn.selected { border-color: #013369; background: rgba(1,51,105,.06); }
    .t-btn.used { opacity: .25; cursor: not-allowed; filter: grayscale(1); }
    .t-btn img { width: 32px; height: 32px; object-fit: contain; }
    .t-btn-label { font-size: 9px; font-weight: 800; color: #9ca3af; letter-spacing: .3px; }
    .t-btn.selected .t-btn-label { color: #013369; }
    .confirm-btn { width: 100%; margin-top: 14px; padding: 14px; background: #013369; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; color: #fff; cursor: pointer; letter-spacing: -.2px; }
    .confirm-btn:active { background: #012a55; }

    /* ── LEADERBOARD ── */
    .lboard-wrap { background: rgba(255,255,255,.75); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.4); border-radius: 12px; overflow: hidden; }
    .lboard-row { display: flex; align-items: center; padding: 11px 14px; gap: 10px; border-bottom: 1px solid #f3f4f6; }
    .lboard-row:last-child { border-bottom: none; }
    .lb-rank { font-size: 15px; font-weight: 900; color: #d1d5db; min-width: 24px; text-align: center; }
    .lb-rank.r1 { color: #D4A017; }
    .lb-rank.r2 { color: #9ca3af; }
    .lb-rank.r3 { color: #cd7f32; }
    .lb-name { font-size: 14px; font-weight: 700; flex: 1; }
    .lb-chips { display: flex; gap: 3px; flex-wrap: wrap; }
    .chip { min-width: 26px; height: 26px; border-radius: 6px; font-size: 8px; font-weight: 800; display: flex; align-items: center; justify-content: center; padding: 0 4px; letter-spacing: .3px; }
    .chip.w { background: rgba(22,163,74,.12); color: #16a34a; }
    .chip.l { background: rgba(213,10,10,.1); color: #D50A0A; }
    .chip.p { background: rgba(245,158,11,.1); color: #b45309; }
    .lb-status { font-size: 10px; font-weight: 800; padding: 4px 9px; border-radius: 20px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .3px; }
    .s-alive { background: rgba(22,163,74,.1); color: #16a34a; }
    .s-dead { background: rgba(213,10,10,.08); color: #D50A0A; }

    /* ── HISTORY ── */
    .hist-list { display: grid; gap: 8px; }
    .hist-row { background: rgba(255,255,255,.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.4); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .hist-wk { font-size: 11px; font-weight: 800; color: #9ca3af; min-width: 38px; text-transform: uppercase; }
    .hist-team { display: flex; align-items: center; gap: 8px; flex: 1; }
    .hist-team img { width: 30px; height: 30px; object-fit: contain; }
    .hist-team-name { font-size: 14px; font-weight: 700; }
    .hist-result { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .3px; }
    .hr-w { background: rgba(22,163,74,.1); color: #16a34a; }
    .hr-l { background: rgba(213,10,10,.08); color: #D50A0A; }
    .hr-p { background: rgba(245,158,11,.1); color: #b45309; }

    /* ── ADMIN ── */
    .admin-block { background: rgba(255,255,255,.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.4); border-radius: 12px; padding: 16px; margin-bottom: 10px; }
    .admin-block-title { font-size: 14px; font-weight: 800; margin-bottom: 14px; color: #111; }
    .a-label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    .a-input { width: 100%; background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #111; outline: none; margin-bottom: 10px; }
    .a-input:focus { border-color: #013369; }
    .a-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .a-btn { padding: 11px; border: none; border-radius: 8px; font-size: 13px; font-weight: 800; cursor: pointer; width: 100%; }
    .a-btn-primary { background: #013369; color: #fff; }
    .a-btn-secondary { background: #f3f4f6; color: #111; border: 1.5px solid #e5e7eb; }
    .a-btn-red { background: #D50A0A; color: #fff; }
    .results-list { display: grid; gap: 6px; max-height: 260px; overflow-y: auto; }
    .result-row { display: flex; align-items: center; justify-content: space-between; background: #f9fafb; border-radius: 8px; padding: 8px 12px; font-size: 12px; gap: 8px; flex-wrap: wrap; }
    .admin-players { display: grid; gap: 6px; }
    .admin-p-row { display: flex; align-items: center; background: #f9fafb; border-radius: 8px; padding: 10px 12px; gap: 10px; }
    .btn-sm-red { font-size: 11px; font-weight: 700; color: #D50A0A; background: rgba(213,10,10,.08); border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; }
    .btn-sm-green { font-size: 11px; font-weight: 700; color: #16a34a; background: rgba(22,163,74,.1); border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; }

    /* ── EMPTY / LOADER ── */
    .loader { text-align: center; padding: 40px; color: #9ca3af; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #013369; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; }
    .empty-icon { font-size: 2.5rem; opacity: .3; margin-bottom: 10px; }
    .empty-txt { font-size: 13px; color: #9ca3af; font-weight: 600; }

    /* ── ELIMINATED ── */
    .elim-card { background: #fff; border-radius: 12px; padding: 36px 20px; text-align: center; }
    .elim-icon { font-size: 3rem; margin-bottom: 12px; }
    .elim-title { font-size: 22px; font-weight: 900; color: #D50A0A; margin-bottom: 8px; }
    .elim-sub { font-size: 13px; color: #9ca3af; font-weight: 600; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1c1c1e; color: #fff; font-size: 13px; font-weight: 700; padding: 11px 22px; border-radius: 30px; opacity: 0; transition: all .25s; z-index: 999; white-space: nowrap; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: #D50A0A; }
    #toast.success { background: #16a34a; }

    /* ── BOTTOM TAB BAR (fija abajo) ── */
    .bottom-tabs-wrap { position: fixed; bottom: 0; left: 0; right: 0; padding: 0 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); z-index: 200; pointer-events: none; }
    .bottom-tabs { background: rgba(30,30,35,.88); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,.12); border-radius: 28px; display: flex; padding: 6px; pointer-events: all; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .b-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px 6px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,.4); border: none; background: transparent; cursor: pointer; gap: 3px; border-radius: 22px; transition: all .2s; }
    .b-tab.active { color: #fff; background: rgba(255,255,255,.15); }
    .b-tab-icon { font-size: 20px; }
  </style>
</head>
<body>

<!-- ═══ AUTH ═══ -->
<div id="auth-screen" class="screen">
  <div class="auth-blob"></div>
<div class="auth-wrap">
    <div class="auth-logo">

  {abbr:'TEN',name:'Titans'},{abbr:'WAS',name:'Commanders'},
]

const logo = a => `https://a.espncdn.com/i/teamlogos/nfl/500/${a.toLowerCase()}.png`
let sb, currentUser=null, currentProfile=null, currentWeek=null, myPicks=[], liveResults={}

async function bootApp() {
  try {
    const { createClient } = supabase
    sb = createClient(SUPABASE_URL, SUPABASE_KEY)
    populateWeekSelects()
    const { data, error } = await sb.auth.getSession()
    if (error || !data.session) {
      localStorage.clear()
      showScreen('auth')
      return
    }
    await initApp(data.session.user)
  } catch(e) {
    console.error('Boot error:', e)
    localStorage.clear()
    showScreen('auth')
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootApp)
} else {
  bootApp()
}

sb.auth.onAuthStateChange(async (e,session) => {
  if (e==='SIGNED_IN' && session) await initApp(session.user)
  else if (e==='SIGNED_OUT') showScreen('auth')
})

async function initApp(user) {
  try {
    currentUser = user
    const { data:profile } = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle()
    currentProfile = profile
    // Auto-create profile if missing
    if (!profile) {
      await sb.from('profiles').insert({id:user.id, email:user.email, username:user.email.split('@')[0], status:'alive', streak:0})
      const { data:p2 } = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle()
      currentProfile = p2
    }
    document.getElementById('nav-avatar').textContent = (currentProfile?.username||user.email)[0].toUpperCase()
    if (ADMIN_EMAILS.includes(user.email)) {
      document.getElementById('admin-tab').style.display='flex'
      document.getElementById('btab-admin').style.display='flex'
    }
    showScreen('app')
    await loadCurrentWeek()
    await loadPicksPage()
  } catch(err) {
    console.error('initApp error:', err)
    showScreen('app')
    await loadPicksPage()
  }
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(n+'-screen').classList.add('active')
}

function showPage(name, idx) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById('page-'+name).classList.add('active')
  document.querySelectorAll('.b-tab').forEach(t=>t.classList.remove('active'))
  const activeTab = document.getElementById('btab-'+name)
  if (activeTab) activeTab.classList.add('active')
  if (name==='leaderboard') loadLeaderboard()
  if (name==='history') loadHistory()
  if (name==='admin') loadAdminPage()
}

function switchAuthTab(tab,btn) {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('login-form').style.display = tab==='login'?'block':'none'
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none'
  document.getElementById('auth-msg').textContent=''
}

async function doLogin() {
  const email=document.getElementById('login-email').value.trim()
  const pass=document.getElementById('login-pass').value
  setAuthMsg('Ingresando...')
  const {error} = await sb.auth.signInWithPassword({email,password:pass})
  if (error) setAuthMsg(error.message,true)
}

async function doSignup() {
  const name=document.getElementById('signup-name').value.trim()
  const email=document.getElementById('signup-email').value.trim()
  const pass=document.getElementById('signup-pass').value
  if(!name||!email||!pass) return setAuthMsg('Completa todos los campos',true)
  setAuthMsg('Creando cuenta...')
  const {data,error} = await sb.auth.signUp({email,password:pass})
  if(error) return setAuthMsg(error.message,true)
  if(data.user) {
    await sb.from('profiles').upsert({id:data.user.id,username:name,email,status:'alive',streak:0})
    setAuthMsg('✅ Revisa tu email para confirmar.',false)
  }
}

async function doLogout() { await sb.auth.signOut(); localStorage.clear() }
function setAuthMsg(msg,isError) {
  const el=document.getElementById('auth-msg')
  el.textContent=msg
  el.className='auth-msg'+(isError===true?' error':isError===false?' success':'')
}

async function loadCurrentWeek() {
  const {data} = await sb.from('weeks').select('*').eq('status','open').order('week_number',{ascending:false}).limit(1).maybeSingle()
  currentWeek=data
}

let selectedTeam=null

async function loadPicksPage() {
  const c=document.getElementById('picks-content')
  const {data:picks} = await sb.from('picks').select('*').eq('player_id',currentUser.id)
  myPicks=picks||[]
  const {data:players} = await sb.from('profiles').select('status')
  const alive=players?.filter(p=>p.status==='alive').length||0
  document.getElementById('stat-alive').textContent=alive
  document.getElementById('stat-total').textContent=players?.length||0
  document.getElementById('stat-week').textContent=currentWeek?.week_number||'–'

  if (currentProfile?.status==='eliminated') {
    c.innerHTML=`<div class="elim-card"><div class="elim-icon">💀</div><div class="elim-title">Eliminated</div><div class="elim-sub">Your pick was incorrect.<br>Follow along in the Ranking.</div></div>`
    return
  }
  if (!currentWeek) {
    // DEMO MODE — show picks UI with a fake week so admin can test
    currentWeek = { week_number: 1, deadline: new Date(Date.now() + 86400000*3).toISOString(), status: 'open' }
  }

  const weekPick=myPicks.find(p=>p.week_number===currentWeek.week_number)
  const usedTeams=myPicks.map(p=>p.team_abbr)
  const deadlinePast=currentWeek.deadline?new Date()>new Date(currentWeek.deadline):false
  const dlStr=currentWeek.deadline?new Date(currentWeek.deadline).toLocaleString('es-MX',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'Por definir'

  let html=`
    <div class="pick-card">
      <div class="pick-card-header">
        <span class="pick-card-week">Week ${currentWeek.week_number}</span>
        <span class="pick-card-deadline">⏱ ${dlStr}</span>
      </div>
      <div class="pick-card-body">`

  if (weekPick) {
    const team=NFL_TEAMS.find(t=>t.abbr===weekPick.team_abbr)
    const resIcon=weekPick.result==='win'?'✅ Won':weekPick.result==='loss'?'❌ Lost':'⏳ Pending'
    const resCls=weekPick.result==='win'?'win':weekPick.result==='loss'?'loss':'pending'
    html+=`
      <div class="pick-prompt">Your pick this week</div>
      <div class="confirmed-row">
        <img class="conf-logo" src="${logo(weekPick.team_abbr)}" onerror="this.style.display='none'" />
        <div>
          <div class="conf-name">${team?.name||weekPick.team_abbr}</div>
          <div class="conf-result ${resCls}">${resIcon}</div>
        </div>
        ${!weekPick.result&&!deadlinePast?`<button class="change-btn" onclick="cancelPick(${weekPick.id})">Change</button>`:''}
      </div>`
  } else if (!deadlinePast) {
    html+=`<div class="pick-prompt">Pick a team — no repeats this season</div>
      <div class="team-grid" id="team-grid">`
    NFL_TEAMS.forEach(t=>{
      const used=usedTeams.includes(t.abbr)
      html+=`<div class="t-btn ${used?'used':''}" id="tbtn-${t.abbr}" onclick="${used?'':` selectTeam('${t.abbr}')`}">
        <img src="${logo(t.abbr)}" onerror="this.style.display='none'" />
        <div class="t-btn-label">${t.abbr}</div>
      </div>`
    })
    html+=`</div><button class="confirm-btn" id="confirm-btn" style="display:none" onclick="confirmPick()">Confirm Pick</button>`
  } else {
    html+=`<div class="empty"><div class="empty-icon">🔒</div><div class="empty-txt">El deadline pasó sin hacer pick.</div></div>`
  }

  html+=`</div></div>`

  // Recent games
  html+=`<div class="section-header">Recent Games</div><div id="recent-games"><div class="loader"><div class="spinner"></div></div></div>`
  c.innerHTML=html
  loadRecentGames()
}

function selectTeam(abbr) {
  document.querySelectorAll('.t-btn:not(.used)').forEach(b=>b.classList.remove('selected'))
  document.getElementById('tbtn-'+abbr)?.classList.add('selected')
  selectedTeam=abbr
  document.getElementById('confirm-btn').style.display='block'
}

async function confirmPick() {
  if(!selectedTeam||!currentWeek) return
  const btn=document.getElementById('confirm-btn')
  btn.disabled=true; btn.textContent='Guardando...'
  const {error} = await sb.from('picks').insert({player_id:currentUser.id,week_number:currentWeek.week_number,team_abbr:selectedTeam,result:null})
  if(error){ showToast('Error: '+error.message,'error'); btn.disabled=false; btn.textContent='Confirm Pick' }
  else { showToast('✅ Pick confirmed: '+selectedTeam); selectedTeam=null; await loadPicksPage() }
}

async function cancelPick(id) {
  if(!confirm('¿Change tu pick?')) return
  await sb.from('picks').delete().eq('id',id)
  selectedTeam=null; await loadPicksPage()
}

async function loadRecentGames() {
  const el=document.getElementById('recent-games')
  if(!el) return
  try {
    const wk=currentWeek?.week_number||1
    const res=await fetch(`${ESPN_API}?seasontype=2&week=${wk}`)
    const json=await res.json()
    const events=(json.events||[]).slice(0,6)
    if(!events.length){ el.innerHTML='<div class="empty"><div class="empty-txt">No games available yet.</div></div>'; return }
    let html=''
    for(const ev of events){
      const comp=ev.competitions?.[0]; if(!comp) continue
      const home=comp.competitors.find(t=>t.homeAway==='home')
      const away=comp.competitors.find(t=>t.homeAway==='away')
      const done=comp.status?.type?.completed
      const hA=home.team.abbreviation, aA=away.team.abbreviation
      const hS=parseInt(home.score||0), aS=parseInt(away.score||0)
      const hWin=done&&hS>aS, aWin=done&&aS>hS
      const hc=TEAM_COLORS[hA]||'#1a1a2e'
      const ac=TEAM_COLORS[aA]||'#1a1a2e'
      const myTeams=myPicks.map(p=>p.team_abbr)
      const badge=myTeams.includes(hA)||myTeams.includes(aA)?'★ Your league played here':''
      const dateStr=ev.date?new Date(ev.date).toLocaleDateString('es-MX',{month:'short',day:'numeric'}):''
      const statusTxt=done?'Final':(comp.status?.type?.shortDetail||'Not played')

      html+=`
        <div class="game-card">
          <div class="game-split">
            <div class="team-side away" style="background:${ac}">
              <img class="t-logo" src="${logo(aA)}" onerror="this.style.display='none'" />
              <div class="t-info">
                <div class="t-abbr">${aA}</div>
                <div class="t-record">${away.records?.[0]?.summary||''}</div>
              </div>
              ${done?`<div class="t-score ${!aWin?'dim':''}">${aS}</div>`:''}
            </div>
            <div class="split-divider"></div>
            <div class="team-side home" style="background:${hc}">
              <img class="t-logo" src="${logo(hA)}" onerror="this.style.display='none'" />
              <div class="t-info">
                <div class="t-abbr">${hA}</div>
                <div class="t-record">${home.records?.[0]?.summary||''}</div>
              </div>
              ${done?`<div class="t-score ${!hWin?'dim':''}">${hS}</div>`:''}
            </div>
          </div>
          <div class="game-footer">
            <span class="gf-final">${statusTxt}</span>
            <div class="gf-sep"></div>
            <span class="gf-date">${dateStr}</span>
            ${badge?`<span class="gf-badge">${badge}</span>`:''}
          </div>
        </div>`
    }
    el.innerHTML=html
  } catch(e) {
    el.innerHTML='<div class="empty"><div class="empty-txt">No se pudieron cargar los juegos.</div></div>'
  }
}

async function loadLeaderboard() {
  const {data:players} = await sb.from('profiles').select('*').order('streak',{ascending:false})
  const {data:allPicks} = await sb.from('picks').select('*')
  if(!players) return
  const pm={}
  allPicks?.forEach(p=>{ if(!pm[p.player_id])pm[p.player_id]=[]; pm[p.player_id].push(p) })
  const sorted=[...players.filter(p=>p.status==='alive'),...players.filter(p=>p.status!=='alive')]
  let html='<div class="lboard-wrap">'
  sorted.forEach((p,i)=>{
    const picks=(pm[p.id]||[]).sort((a,b)=>a.week_number-b.week_number)
    const chips=picks.map(pk=>`<div class="chip ${pk.result==='win'?'w':pk.result==='loss'?'l':'p'}" title="Wk${pk.week_number}: ${pk.team_abbr}">${pk.team_abbr}</div>`).join('')
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':''
    const alive=p.status==='alive'
    html+=`<div class="lboard-row">
      <span class="lb-rank ${rc}">${i+1}</span>
      <span class="lb-name">${p.username||p.email?.split('@')[0]}</span>
      <div class="lb-chips">${chips||'<span style="font-size:11px;color:#d1d5db">–</span>'}</div>
      <span class="lb-status ${alive?'s-alive':'s-dead'}">${alive?'Alive':'Eliminated'}</span>
    </div>`
  })
  html+='</div>'
  document.getElementById('leaderboard-content').innerHTML=html
}

async function loadHistory() {
  const {data:picks} = await sb.from('picks').select('*').eq('player_id',currentUser.id).order('week_number')
  if(!picks?.length){ document.getElementById('history-content').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">No picks yet.</div></div>'; return }
  let html='<div class="hist-list">'
  picks.forEach(p=>{
    const team=NFL_TEAMS.find(t=>t.abbr===p.team_abbr)
    const resTxt=p.result==='win'?'✅ Won':p.result==='loss'?'❌ Lost':'⏳ Pending'
    const resCls=p.result==='win'?'hr-w':p.result==='loss'?'hr-l':'hr-p'
    html+=`<div class="hist-row">
      <span class="hist-wk">Wk ${p.week_number}</span>
      <div class="hist-team"><img src="${logo(p.team_abbr)}" onerror="this.style.display='none'" /><span class="hist-team-name">${team?.name||p.team_abbr}</span></div>
      <span class="hist-result ${resCls}">${resTxt}</span>
    </div>`
  })
  html+='</div>'
  document.getElementById('history-content').innerHTML=html
}

function populateWeekSelects(){
  ['admin-week-num','admin-results-week'].forEach(id=>{
    const sel=document.getElementById(id); if(!sel) return
    for(let w=1;w<=18;w++) sel.innerHTML+=`<option value="${w}">Week ${w}</option>`
  })
}

async function loadAdminPage(){
  const {data:players} = await sb.from('profiles').select('*').order('username')
  let html='<div class="admin-players">'
  players?.forEach(p=>{
    const alive=p.status==='alive'
    html+=`<div class="admin-p-row">
      <span style="flex:1;font-size:13px;font-weight:700">${p.username||p.email}</span>
      <span class="lb-status ${alive?'s-alive':'s-dead'}">${alive?'Alive':'Elim.'}</span>
      ${alive?`<button class="btn-sm-red" onclick="eliminatePlayer('${p.id}')">Eliminate</button>`:`<button class="btn-sm-green" onclick="revivePlayer('${p.id}')">Revive</button>`}
    </div>`
  })
  html+='</div>'
  document.getElementById('admin-players-list').innerHTML=html
}

async function adminOpenWeek(){
  const wk=document.getElementById('admin-week-num').value
  const dl=document.getElementById('admin-deadline').value
  if(!wk) return showToast('Select a week','error')
  await sb.from('weeks').upsert({week_number:parseInt(wk),status:'open',deadline:dl||null},{onConflict:'week_number'})
  await loadCurrentWeek(); showToast(`✅ Week ${wk} abierta`)
}

async function adminCloseWeek(){
  const wk=document.getElementById('admin-week-num').value
  if(!wk) return showToast('Select a week','error')
  await sb.from('weeks').upsert({week_number:parseInt(wk),status:'closed'},{onConflict:'week_number'})
  showToast(`🔒 Week ${wk} cerrada`)
}

async function fetchNFLResults(){
  const wk=document.getElementById('admin-results-week').value
  if(!wk) return showToast('Select a week','error')
  const list=document.getElementById('results-list')
  list.innerHTML='<div class="loader"><div class="spinner"></div></div>'
  try {
    const res=await fetch(`${ESPN_API}?seasontype=2&week=${wk}`)
    const json=await res.json()
    liveResults={}
    let html=''
    for(const ev of (json.events||[])){
      const c=ev.competitions?.[0]; if(!c) continue
      const home=c.competitors.find(t=>t.homeAway==='home')
      const away=c.competitors.find(t=>t.homeAway==='away')
      const done=c.status?.type?.completed
      const hA=home.team.abbreviation,aA=away.team.abbreviation
      const hS=parseInt(home.score||0),aS=parseInt(away.score||0)
      if(done){ liveResults[hA]=hS>aS?'win':'loss'; liveResults[aA]=aS>hS?'win':'loss' }
      const winner=done?(hS>aS?hA:aA):null
      html+=`<div class="result-row">
        <span style="font-weight:800;font-size:12px">${aA} @ ${hA}</span>
        <span style="font-size:11px;color:#6b7280">${done?`${aS}–${hS}`:'Pending'}</span>
        ${done?`<span class="lb-status s-alive" style="font-size:10px">✅ ${winner}</span>`:`<span style="font-size:10px;color:#9ca3af">–</span>`}
      </div>`
    }
    list.innerHTML=html||'<div class="empty"><div class="empty-txt">No games</div></div>'
  } catch(e){ list.innerHTML='<div class="empty"><div class="empty-txt">Error loading</div></div>' }
}

async function processEliminations(){
  const wk=document.getElementById('admin-results-week').value
  if(!wk||!Object.keys(liveResults).length) return showToast('Fetch results first','error')
  const {data:picks} = await sb.from('picks').select('*').eq('week_number',parseInt(wk))
  if(!picks?.length) return showToast('No picks this week','error')
  let count=0
  for(const pick of picks){
    const result=liveResults[pick.team_abbr]; if(!result) continue
    await sb.from('picks').update({result}).eq('id',pick.id)
    if(result==='loss') await sb.from('profiles').update({status:'eliminated'}).eq('id',pick.player_id)
    count++
  }
  showToast(`⚡ ${count} picks processed`); loadAdminPage()
}

async function revivePlayer(id){ await sb.from('profiles').update({status:'alive'}).eq('id',id); showToast('✅ Revived'); loadAdminPage() }
async function eliminatePlayer(id){ if(!confirm('¿Eliminate?')) return; await sb.from('profiles').update({status:'eliminated'}).eq('id',id); showToast('Eliminated'); loadAdminPage() }

let toastTimer
function showToast(msg,type='success'){
  const t=document.getElementById('toast')
  t.textContent=msg; t.className='show '+type
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='',3000)
}
