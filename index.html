<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PickBros Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#eef0f2;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;color:#111}
    .screen{display:none}
    .screen.active{display:block}

    /* AUTH */
    #auth-screen.active{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#eef0f2;position:relative;overflow:hidden}
    #auth-screen::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,.35) 0%,transparent 70%);top:-100px;left:-100px;border-radius:50%;filter:blur(40px)}
    #auth-screen::after{content:'';position:absolute;width:350px;height:350px;background:radial-gradient(circle,rgba(1,51,105,.25) 0%,transparent 70%);bottom:-80px;right:-80px;border-radius:50%;filter:blur(50px)}
    .auth-wrap{width:100%;max-width:380px;padding:0 20px;position:relative;z-index:1}
    .auth-logo{text-align:center;margin-bottom:28px}
    .auth-logo-sub{font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:3px;text-transform:uppercase;margin-top:10px}
    .auth-card{background:rgba(255,255,255,.75);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8)}
    .auth-tabs{display:flex;background:rgba(0,0,0,.05);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px}
    .auth-tab{flex:1;padding:9px;border:none;background:transparent;font-size:13px;font-weight:700;color:#9ca3af;border-radius:8px;cursor:pointer;transition:all .2s}
    .auth-tab.active{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .field input{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;font-size:14px;color:#111;outline:none;background:#fff;transition:border-color .2s}
    .field input:focus{border-color:#ff6b35}
    .btn-auth{width:100%;padding:13px;background:#ff6b35;border:none;border-radius:10px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(255,107,53,.3)}
    .btn-auth:active{transform:scale(.98)}
    .auth-msg{font-size:12px;color:#9ca3af;text-align:center;margin-top:10px}
    .auth-msg.error{color:#dc2626}
    .auth-msg.success{color:#16a34a}

    /* APP NAV */
    #app-screen.active{display:block;min-height:100vh}
    .top-nav{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:200}
    .nav-right{display:flex;align-items:center;gap:8px}
    .nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.08);color:#6b7280;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .nav-logout{font-size:12px;font-weight:700;color:#9ca3af;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.08);border-radius:8px;padding:6px 12px;cursor:pointer}
    .nav-logout:active{background:rgba(0,0,0,.08)}

    /* MAIN */
    .main{padding:14px 12px 110px;max-width:600px;margin:0 auto}
    .page{display:none}
    .page.active{display:block}
    .section-title{font-size:20px;font-weight:800;color:#111;margin:16px 0 10px;letter-spacing:-.3px}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .stat-card{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:14px 10px;text-align:center}
    .stat-n{font-size:28px;font-weight:900;color:#111;line-height:1}
    .stat-l{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

    /* PICK CARD */
    .pick-card{background:rgba(255,255,255,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .pick-header{background:#ff6b35;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
    .pick-week{font-size:12px;font-weight:800;color:rgba(255,255,255,.95);text-transform:uppercase;letter-spacing:1px}
    .pick-deadline{font-size:11px;font-weight:600;color:rgba(255,255,255,.7)}
    .pick-body{padding:16px}
    .pick-prompt{font-size:11px;font-weight:700;color:#9ca3af;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
    .confirmed-row{display:flex;align-items:center;gap:14px}
    .conf-logo{width:56px;height:56px;object-fit:contain}
    .conf-name{font-size:22px;font-weight:900;color:#111}
    .conf-result{font-size:13px;font-weight:700;margin-top:3px}
    .conf-result.win{color:#16a34a}
    .conf-result.loss{color:#dc2626}
    .conf-result.pending{color:#9ca3af}
    .change-btn{margin-left:auto;font-size:12px;font-weight:700;color:#6b7280;background:#f3f4f6;border:none;border-radius:8px;padding:8px 14px;cursor:pointer}

    /* TEAM GRID */
    .team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    @media(min-width:400px){.team-grid{grid-template-columns:repeat(5,1fr)}}
    @media(min-width:500px){.team-grid{grid-template-columns:repeat(6,1fr)}}
    .t-btn{background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
    .t-btn:active{transform:scale(.95)}
    .t-btn.selected{border-color:#ff6b35;background:rgba(255,107,53,.06)}
    .t-btn.used{opacity:.25;cursor:not-allowed;filter:grayscale(1)}
    .t-btn.bye{opacity:.35;cursor:not-allowed;filter:grayscale(.8);border-style:dashed;position:relative}
    .t-btn.bye .t-btn-label{color:#bbb}
    .t-btn.bye::after{content:"BYE";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:7px;font-weight:800;color:#9ca3af;letter-spacing:.5px;white-space:nowrap}
    .t-btn img{width:32px;height:32px;object-fit:contain}
    .t-btn-label{font-size:9px;font-weight:800;color:#9ca3af;letter-spacing:.3px}
    .t-btn.selected .t-btn-label{color:#ff6b35}
    .confirm-btn{width:100%;margin-top:14px;padding:14px;background:#ff6b35;border:none;border-radius:12px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,.3)}
    .confirm-btn:active{transform:scale(.98)}

    /* GAME CARDS */
    .game-card{border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .game-split{display:flex;height:88px}
    .team-side{flex:1;display:flex;align-items:center;padding:0 12px;gap:8px}
    .team-side.away{flex-direction:row}
    .team-side.home{flex-direction:row-reverse}
    .t-logo{width:42px;height:42px;object-fit:contain;flex-shrink:0}
    .t-info{display:flex;flex-direction:column}
    .team-side.home .t-info{align-items:flex-end}
    .t-abbr{font-size:14px;font-weight:900;color:#fff;letter-spacing:.5px}
    .t-record{font-size:10px;font-weight:600;color:rgba(255,255,255,.6)}
    .t-score{font-size:34px;font-weight:900;color:#fff;line-height:1;margin:0 8px}
    .t-score.dim{color:rgba(255,255,255,.35)}
    .split-div{width:1px;background:rgba(255,255,255,.2);flex-shrink:0}
    .game-footer{background:#111827;display:flex;align-items:center;padding:7px 14px;gap:8px}
    .gf-status{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.5px}
    .gf-sep{width:1px;height:12px;background:rgba(255,255,255,.2)}
    .gf-date{font-size:11px;color:rgba(255,255,255,.4);font-weight:600}
    .gf-badge{margin-left:auto;font-size:10px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,.12);padding:3px 8px;border-radius:20px}

    /* LEADERBOARD */
    .lboard{background:rgba(255,255,255,.8);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:14px;overflow:hidden}
    .lboard-row{display:flex;align-items:center;padding:11px 14px;gap:10px;border-bottom:1px solid rgba(0,0,0,.04)}
    .lboard-row:last-child{border-bottom:none}
    .lb-rank{font-size:15px;font-weight:900;color:#d1d5db;min-width:22px;text-align:center}
    .lb-rank.r1{color:#D4A017}
    .lb-rank.r2{color:#9ca3af}
    .lb-rank.r3{color:#cd7f32}
    .lb-name{font-size:14px;font-weight:700;flex:1}
    .lb-chips{display:flex;gap:3px;flex-wrap:wrap;max-width:180px}
    .chip{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .chip.w{background:rgba(22,163,74,.12);color:#16a34a}
    .chip.l{background:rgba(220,38,38,.1);color:#dc2626}
    .chip.p{background:rgba(245,158,11,.1);color:#b45309}
    .lb-badge{font-size:10px;font-weight:800;padding:4px 9px;border-radius:20px;flex-shrink:0;text-transform:uppercase}
    .alive{background:rgba(22,163,74,.1);color:#16a34a}
    .dead{background:rgba(220,38,38,.08);color:#dc2626}

    /* HISTORY */
    .hist-list{display:grid;gap:8px}
    .hist-row{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
    .hist-wk{font-size:11px;font-weight:800;color:#9ca3af;min-width:36px;text-transform:uppercase}
    .hist-team{display:flex;align-items:center;gap:8px;flex:1}
    .hist-team img{width:28px;height:28px;object-fit:contain}
    .hist-name{font-size:14px;font-weight:700}
    .hist-result{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;text-transform:uppercase}
    .hr-w{background:rgba(22,163,74,.1);color:#16a34a}
    .hr-l{background:rgba(220,38,38,.08);color:#dc2626}
    .hr-p{background:rgba(245,158,11,.1);color:#b45309}

    /* ADMIN */
    .admin-block{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:16px;margin-bottom:10px}
    .admin-title{font-size:14px;font-weight:800;margin-bottom:14px}
    .a-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .a-input{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:13px;color:#111;outline:none;margin-bottom:10px}
    .a-input:focus{border-color:#ff6b35}
    .a-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .a-btn{padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;width:100%}
    .a-primary{background:#111;color:#fff}
    .a-secondary{background:#f3f4f6;color:#111;border:1.5px solid #e5e7eb}
    .a-danger{background:#dc2626;color:#fff}
    .results-list{display:grid;gap:6px;max-height:260px;overflow-y:auto}
    .result-row{display:flex;align-items:center;justify-content:space-between;background:#f9fafb;border-radius:8px;padding:8px 12px;font-size:12px;gap:8px;flex-wrap:wrap}
    .admin-players{display:grid;gap:6px}
    .admin-p-row{display:flex;align-items:center;background:#f9fafb;border-radius:8px;padding:10px 12px;gap:10px}
    .btn-elim{font-size:11px;font-weight:700;color:#dc2626;background:rgba(220,38,38,.08);border:none;border-radius:6px;padding:5px 10px;cursor:pointer}
    .btn-revive{font-size:11px;font-weight:700;color:#16a34a;background:rgba(22,163,74,.1);border:none;border-radius:6px;padding:5px 10px;cursor:pointer}

    /* FLOATING ISLAND */
    .island-wrap{position:fixed;bottom:0;left:0;right:0;padding:0 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));z-index:200;pointer-events:none}
    .island{background:rgba(255,255,255,.22);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);border:1px solid rgba(255,255,255,.5);border-radius:30px;display:flex;padding:6px;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.7)}
    .i-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;font-size:10px;font-weight:700;color:rgba(0,0,0,.3);border:none;background:transparent;cursor:pointer;gap:4px;border-radius:24px;transition:all .2s}
    .i-tab.active{color:#ff6b35;background:rgba(255,107,53,.1)}
    .i-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* EMPTY / LOADER */
    .loader{text-align:center;padding:40px;color:#9ca3af}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#ff6b35;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:40px 20px}
    .empty-icon{font-size:2.5rem;opacity:.3;margin-bottom:10px}
    .empty-txt{font-size:13px;color:#9ca3af;font-weight:600}
    .elim-card{background:rgba(255,255,255,.8);border-radius:14px;padding:36px 20px;text-align:center}
    .elim-title{font-size:22px;font-weight:900;color:#dc2626;margin-bottom:8px}
    .elim-sub{font-size:13px;color:#9ca3af;font-weight:600}

    /* TOAST */
    #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#1c1c1e;color:#fff;font-size:13px;font-weight:700;padding:11px 22px;border-radius:30px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.error{background:#dc2626}
    #toast.success{background:#16a34a}


    .weekly-picks-grid{display:grid;gap:6px}
    .weekly-pick-row{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px}
    .wp-name{font-size:13px;font-weight:700;flex:1}
    .wp-team{display:flex;align-items:center;gap:6px}
    .game-day-label{font-size:11px;font-weight:800;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;padding:0 2px}
    .live-badge{background:#dc2626;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.5px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .upcoming-time{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;margin-left:auto;padding-right:4px}
    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0 16px 32px}
    .modal-overlay.hidden{display:none}
    .modal-box{background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.7);border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-title{font-size:17px;font-weight:800;color:#111;margin-bottom:6px}
    .modal-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .modal-cancel{padding:13px;border:1.5px solid #e5e7eb;border-radius:12px;background:#f9fafb;font-size:14px;font-weight:700;color:#6b7280;cursor:pointer}
    .modal-confirm{padding:13px;border:none;border-radius:12px;background:#ff6b35;font-size:14px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 4px 12px rgba(255,107,53,.3)}
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen" class="screen">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div style="display:flex;justify-content:center">
        <svg style="width:220px;height:auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 621.27 119.02">
          <defs><style>.a0{fill:#ff6b35}.a1{fill:#111;font-family:BlackHanSans-Regular,'Black Han Sans';font-size:120.46px;isolation:isolate}</style></defs>

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(n+'-screen').classList.add('active')
}

function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById('page-'+name).classList.add('active')
  document.querySelectorAll('.i-tab').forEach(t=>t.classList.remove('active'))
  if(btn) btn.classList.add('active')
  if(name==='leaderboard') loadLeaderboard()
  if(name==='history') loadHistory()
  if(name==='admin') loadAdminPage()
  if(name==='games') loadGamesPage()
}

function switchTab(tab, btn){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('login-form').style.display = tab==='login'?'block':'none'
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none'
  document.getElementById('auth-msg').textContent=''
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim()
  const pass=document.getElementById('login-pass').value
  setMsg('Signing in...')
  const {error} = await sb.auth.signInWithPassword({email,password:pass})
  if(error) setMsg(error.message, true)
}

async function doSignup(){
  const name=document.getElementById('signup-name').value.trim()
  const email=document.getElementById('signup-email').value.trim()
  const pass=document.getElementById('signup-pass').value
  if(!name||!email||!pass) return setMsg('Fill in all fields', true)
  setMsg('Creating account...')
  const {data,error} = await sb.auth.signUp({email,password:pass})
  if(error) return setMsg(error.message, true)
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,username:name,email,status:'alive',streak:0})
    setMsg('✅ Check your email to confirm.', false)
  }
}

async function doLogout(){
  await sb.auth.signOut()
  localStorage.clear()
}

function setMsg(msg, isError){
  const el=document.getElementById('auth-msg')
  el.textContent=msg
  el.className='auth-msg'+(isError===true?' error':isError===false?' success':'')
}

async function initApp(user){
  currentUser=user
  let {data:profile} = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle()
  if(!profile){
    await sb.from('profiles').insert({id:user.id,email:user.email,username:user.email.split('@')[0],status:'alive',streak:0})
    const r = await sb.from('profiles').select('*').eq('id',user.id).maybeSingle()
    profile=r.data
  }
  currentProfile=profile
  document.getElementById('nav-avatar').textContent=(profile?.username||user.email.split('@')[0])[0].toUpperCase()
  if(ADMIN_EMAILS.includes(user.email)) document.getElementById('itab-admin').style.display='flex'
  showScreen('app')
  await loadCurrentWeek()
  await loadPicksPage()
  setInterval(async () => {
    await loadRecentGames()
    await autoCheckPickResult()
  }, 30000)
}

async function loadCurrentWeek(){
  const {data} = await sb.from('weeks').select('*').eq('status','open').order('week_number',{ascending:false}).limit(1).maybeSingle()
  currentWeek=data
}

async function loadPicksPage(){
  const c=document.getElementById('picks-content')
  const {data:picks} = await sb.from('picks').select('*').eq('player_id',currentUser.id)
  myPicks=picks||[]
  const {data:players} = await sb.from('profiles').select('status')
  document.getElementById('stat-alive').textContent=players?.filter(p=>p.status==='alive').length||0
  document.getElementById('stat-total').textContent=players?.length||0
  document.getElementById('stat-week').textContent=currentWeek?.week_number||'–'

  if(currentProfile?.status==='eliminated'){
    c.innerHTML='<div class="elim-card"><div style="font-size:3rem;margin-bottom:12px">💀</div><div class="elim-title">Eliminated</div><div class="elim-sub">Your pick was incorrect.<br>Follow along in the Ranking.</div></div>'
    return
  }

  // Demo mode if no active week
  if(!currentWeek) currentWeek={week_number:1,deadline:new Date(Date.now()+86400000*3).toISOString(),status:'open'}

  const weekPick=myPicks.find(p=>p.week_number===currentWeek.week_number)
  const usedTeams=myPicks.map(p=>p.team_abbr)
  const deadlinePast=currentWeek.deadline?new Date()>new Date(currentWeek.deadline):false
  const dlStr=currentWeek.deadline?new Date(currentWeek.deadline).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'TBD'

  let html=`<div class="pick-card"><div class="pick-header"><span class="pick-week">Week ${currentWeek.week_number}</span><span class="pick-deadline">${dlStr}</span></div><div class="pick-body">`

  if(weekPick){
    const team=TEAMS.find(t=>t.abbr===weekPick.team_abbr)
    const resIcon=weekPick.result==='win'?'✅ Won':weekPick.result==='loss'?'❌ Lost':'⏳ Pending'
    const resCls=weekPick.result==='win'?'win':weekPick.result==='loss'?'loss':'pending'
    html+=`<div class="pick-prompt">Your pick this week</div>
      <div class="confirmed-row">
        <img class="conf-logo" src="${logo(weekPick.team_abbr)}" onerror="this.style.display='none'" />
        <div><div class="conf-name">${team?.name||weekPick.team_abbr}</div><div class="conf-result ${resCls}">${resIcon}</div></div>
        ${!weekPick.result&&!deadlinePast?`<button class="change-btn" onclick="cancelPick(${weekPick.id})">Change</button>`:''}
      </div>`
  } else if(!deadlinePast){
    html+=`<div class="pick-prompt">Pick a team — no repeats this season</div><div class="team-grid" id="team-grid">`
    TEAMS.forEach(t=>{
      const used=usedTeams.includes(t.abbr)
      html+=`<div class="t-btn${used?' used':''}" id="tbtn-${t.abbr}" onclick="${used?'void(0)':`selectTeam('${t.abbr}')`}">
        <img src="${logo(t.abbr)}" onerror="this.style.display='none'" />
        <div class="t-btn-label">${t.abbr}</div>
      </div>`
    })
    html+=`</div><button class="confirm-btn" id="confirm-btn" style="display:none" onclick="confirmPick()">Confirm Pick</button>`
  } else {
    html+=`<div class="empty"><div class="empty-txt">Deadline passed without a pick.</div></div>`
  }

  // Show everyone's picks after deadline
  if(deadlinePast){
    html+=`</div></div><div class="section-title">Week ${currentWeek.week_number} — Everyone's Picks</div><div id="weekly-picks"><div class="loader"><div class="spinner"></div></div></div>`
  } else {
    html+=`</div></div>`
  }
  c.innerHTML=html
  detectByeTeams()
  if(deadlinePast) loadWeeklyPicks()
}

function selectTeam(abbr){
  document.querySelectorAll('.t-btn:not(.used)').forEach(b=>b.classList.remove('selected'))
  document.getElementById('tbtn-'+abbr)?.classList.add('selected')
  selectedTeam=abbr
  document.getElementById('confirm-btn').style.display='block'
}

async function confirmPick(){
  if(!selectedTeam||!currentWeek) return
  const btn=document.getElementById('confirm-btn')
  btn.disabled=true; btn.textContent='Saving...'
  const {error} = await sb.from('picks').insert({player_id:currentUser.id,week_number:currentWeek.week_number,team_abbr:selectedTeam,result:null})
  if(error){ toast('Error: '+error.message,'error'); btn.disabled=false; btn.textContent='Confirm Pick' }
  else { toast('✅ Pick confirmed: '+selectedTeam); selectedTeam=null; await loadPicksPage() }
}

let pendingCancelId = null
function cancelPick(id){
  pendingCancelId = id
  document.getElementById('change-modal').classList.remove('hidden')
}
function closeModal(){
  pendingCancelId = null
  document.getElementById('change-modal').classList.add('hidden')
}
async function confirmChangePick(){
  if(!pendingCancelId) return
  document.getElementById('change-modal').classList.add('hidden')
  await sb.from('picks').delete().eq('id',pendingCancelId)
  pendingCancelId = null
  selectedTeam = null
  await loadPicksPage()
}

async function loadWeeklyPicks(){
  const el=document.getElementById('weekly-picks')
  if(!el||!currentWeek) return
  try{
    const {data:picks} = await sb.from('picks').select('team_abbr, result, profiles(username, email)').eq('week_number', currentWeek.week_number)
    if(!picks?.length){ el.innerHTML='<div class="empty"><div class="empty-txt">No picks this week yet.</div></div>'; return }
    let html='<div class="weekly-picks-grid">'
    picks.forEach(p=>{
      const name=p.profiles?.username||p.profiles?.email?.split('@')[0]||'Player'
      const resCls=p.result==='win'?'hr-w':p.result==='loss'?'hr-l':'hr-p'
      const resTxt=p.result==='win'?'✅ Won':p.result==='loss'?'❌ Lost':'⏳ Pending'
      html+=`<div class="weekly-pick-row">
        <span class="wp-name">${name}</span>
        <div class="wp-team">
          <img src="https://a.espncdn.com/i/teamlogos/nfl/500/${p.team_abbr.toLowerCase()}.png" style="width:28px;height:28px;object-fit:contain" onerror="this.style.display='none'"/>
          <span style="font-size:13px;font-weight:700">${p.team_abbr}</span>
        </div>
        <span class="hist-result ${resCls}">${resTxt}</span>
      </div>`
    })
    html+='</div>'
    el.innerHTML=html
  }catch(e){ console.error('loadWeeklyPicks error:',e); el.innerHTML='<div class="empty"><div class="empty-txt">Could not load picks.</div></div>' }
}

async function loadGamesPage(){
  const el=document.getElementById('games-content')
  const title=document.getElementById('games-title')
  if(!el) return
  el.innerHTML='<div class="loader"><div class="spinner"></div></div>'
  try{
    const wk=currentWeek?.week_number||1
    if(title) title.textContent=`Week ${wk} Games`
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?seasontype=2&week=${wk}`)
    const json=await res.json()
    const events=json.events||[]
    if(!events.length){ el.innerHTML='<div class="empty"><div class="empty-txt">No games scheduled yet.</div></div>'; return }

    // Group by day
    const days={}
    events.forEach(ev=>{
      const d=ev.date?new Date(ev.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):'TBD'
      if(!days[d]) days[d]=[]
      days[d].push(ev)
    })

    let html=''
    for(const [day,evs] of Object.entries(days)){
      html+=`<div class="game-day-label">${day}</div>`
      for(const ev of evs){
        const comp=ev.competitions?.[0]; if(!comp) continue
        const home=comp.competitors.find(t=>t.homeAway==='home')
        const away=comp.competitors.find(t=>t.homeAway==='away')
        const done=comp.status?.type?.completed
        const live=!done&&comp.status?.type?.state==='in'
        const hA=home.team.abbreviation, aA=away.team.abbreviation
        const hS=parseInt(home.score||0), aS=parseInt(away.score||0)
        const hWin=done&&hS>aS, aWin=done&&aS>hS
        const hc=COLORS[hA]||'#1a1a2e', ac=COLORS[aA]||'#1a1a2e'
        const hLight=LIGHT_BG.includes(hA), aLight=LIGHT_BG.includes(aA)
        const hBg=hLight?`background:${hc};box-shadow:inset 0 0 0 400px rgba(255,255,255,.12)`:`background:${hc}`
        const aBg=aLight?`background:${ac};box-shadow:inset 0 0 0 400px rgba(255,255,255,.12)`:`background:${ac}`
        const gameTime=ev.date?new Date(ev.date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):''
        const statusTxt=done?'Final':live?(comp.status?.displayClock||'Live'):(comp.status?.type?.shortDetail||gameTime)
        const myTeamHere=myPicks.some(p=>p.team_abbr===hA||p.team_abbr===aA)

        html+=`<div class="game-card">
          <div class="game-split">
            <div class="team-side away" style="${aBg}">
              <img class="t-logo" src="https://a.espncdn.com/i/teamlogos/nfl/500/${aA.toLowerCase()}.png" onerror="this.style.display='none'" />
              <div class="t-info"><div class="t-abbr">${aA}</div><div class="t-record">${away.records?.[0]?.summary||''}</div></div>
              ${done||live?`<div class="t-score${!aWin&&done?' dim':''}">${aS}</div>`:`<span class="upcoming-time"></span>`}
            </div>
            <div class="split-div"></div>
            <div class="team-side home" style="${hBg}">
              <img class="t-logo" src="https://a.espncdn.com/i/teamlogos/nfl/500/${hA.toLowerCase()}.png" onerror="this.style.display='none'" />
              <div class="t-info"><div class="t-abbr">${hA}</div><div class="t-record">${home.records?.[0]?.summary||''}</div></div>
              ${done||live?`<div class="t-score${!hWin&&done?' dim':''}">${hS}</div>`:`<span class="upcoming-time"></span>`}
            </div>
          </div>
          <div class="game-footer">
            ${live?'<span class="live-badge">LIVE</span>':'<span class="gf-status">'+statusTxt+'</span>'}
            ${!live?'<div class="gf-sep"></div><span class="gf-date">'+statusTxt+'</span>':'<span style="font-size:11px;color:rgba(255,255,255,.5);margin-left:6px">'+comp.status?.displayClock+'</span>'}
            ${myTeamHere?'<span class="gf-badge">★ Your pick</span>':''}
          </div>
        </div>`
      }
    }
    el.innerHTML=html

    // Auto-refresh live scores every 30s when on games page
    if(events.some(ev=>ev.competitions?.[0]?.status?.type?.state==='in')){
      setTimeout(()=>{ if(document.getElementById('page-games').classList.contains('active')) loadGamesPage() }, 30000)
    }
  }catch(e){ el.innerHTML='<div class="empty"><div class="empty-txt">Could not load games.</div></div>' }
}

async function detectByeTeams(){
  try{
    const wk=currentWeek?.week_number||1
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?seasontype=2&week=${wk}`)
    const json=await res.json()
    const playingTeams=new Set()
    for(const ev of (json.events||[])){
      const comp=ev.competitions?.[0]; if(!comp) continue
      comp.competitors.forEach(t=>playingTeams.add(t.team.abbreviation))
    }
    if(playingTeams.size>0){
      TEAMS.forEach(t=>{
        const btn=document.getElementById('tbtn-'+t.abbr)
        if(!btn||btn.classList.contains('used')) return
        if(!playingTeams.has(t.abbr)){
          btn.classList.add('bye')
          btn.onclick=null
          btn.title='Bye week'
        }
      })
    }
  }catch(e){}
}

async function autoCheckPickResult(){
  if(!currentWeek||!currentUser) return
  const weekPick=myPicks.find(p=>p.week_number===currentWeek.week_number)
  if(!weekPick||weekPick.result) return // already has result
  try{
    const res=await fetch(`${ESPN}?seasontype=2&week=${currentWeek.week_number}`)
    const json=await res.json()
    for(const ev of (json.events||[])){
      const comp=ev.competitions?.[0]; if(!comp) continue
      const done=comp.status?.type?.completed; if(!done) continue
      const home=comp.competitors.find(t=>t.homeAway==='home')
      const away=comp.competitors.find(t=>t.homeAway==='away')
      const hA=home.team.abbreviation, aA=away.team.abbreviation
      if(hA!==weekPick.team_abbr && aA!==weekPick.team_abbr) continue
      const hS=parseInt(home.score||0), aS=parseInt(away.score||0)
      const myTeam=weekPick.team_abbr
      const tied=hS===aS
      const result=tied?'win':(myTeam===hA&&hS>aS)||(myTeam===aA&&aS>hS)?'win':'loss'
      await sb.from('picks').update({result}).eq('id',weekPick.id)
      if(result==='loss') await sb.from('profiles').update({status:'eliminated'}).eq('id',currentUser.id)
      await loadPicksPage() // refresh UI to show green/red
      break
    }
  }catch(e){}
}

async function loadLeaderboard(){
  const {data:players} = await sb.from('profiles').select('*').order('streak',{ascending:false})
  const {data:allPicks} = await sb.from('picks').select('*')
  if(!players) return
  const pm={}
  allPicks?.forEach(p=>{ if(!pm[p.player_id])pm[p.player_id]=[]; pm[p.player_id].push(p) })
  const sorted=[...players.filter(p=>p.status==='alive'),...players.filter(p=>p.status!=='alive')]
  let html='<div class="lboard">'
  sorted.forEach((p,i)=>{
    const picks=(pm[p.id]||[]).sort((a,b)=>a.week_number-b.week_number)
    const chips=picks.map(pk=>{
    const res=pk.result==='win'?'w':pk.result==='loss'?'l':'p'
    const borderColor=pk.result==='win'?'#16a34a':pk.result==='loss'?'#dc2626':'#d97706'
    return `<div class="chip ${res}" title="Wk${pk.week_number}: ${pk.team_abbr}" style="background:none;border:2px solid ${borderColor};padding:2px">
      <img src="https://a.espncdn.com/i/teamlogos/nfl/500/${pk.team_abbr.toLowerCase()}.png" style="width:18px;height:18px;object-fit:contain" onerror="this.style.display='none'" />
    </div>`
  }).join('')
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':''
    const alive=p.status==='alive'
    html+=`<div class="lboard-row">
      <span class="lb-rank ${rc}">${i+1}</span>
      <span class="lb-name">${p.username||p.email?.split('@')[0].replace(/[._]/g,' ')}</span>
      <div class="lb-chips">${chips||'<span style="font-size:11px;color:#d1d5db">–</span>'}</div>
      <span class="lb-badge ${alive?'alive':'dead'}">${alive?'Alive':'Out'}</span>
    </div>`
  })
  html+='</div>'
  document.getElementById('leaderboard-content').innerHTML=html
}

async function loadHistory(){
  const {data:picks} = await sb.from('picks').select('*').eq('player_id',currentUser.id).order('week_number')
  if(!picks?.length){ document.getElementById('history-content').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">No picks yet.</div></div>'; return }
  let html='<div class="hist-list">'
  picks.forEach(p=>{
    const team=TEAMS.find(t=>t.abbr===p.team_abbr)
    const resTxt=p.result==='win'?'✅ Won':p.result==='loss'?'❌ Lost':'⏳ Pending'
    const resCls=p.result==='win'?'hr-w':p.result==='loss'?'hr-l':'hr-p'
    html+=`<div class="hist-row">
      <span class="hist-wk">Wk ${p.week_number}</span>
      <div class="hist-team"><img src="${logo(p.team_abbr)}" onerror="this.style.display='none'" /><span class="hist-name">${team?.name||p.team_abbr}</span></div>
      <span class="hist-result ${resCls}">${resTxt}</span>
    </div>`
  })
  html+='</div>'
  document.getElementById('history-content').innerHTML=html
}

async function loadAdminPage(){
  const {data:players} = await sb.from('profiles').select('*').order('username')
  let html='<div class="admin-players">'
  players?.forEach(p=>{
    const alive=p.status==='alive'
    html+=`<div class="admin-p-row">
      <span style="flex:1;font-size:13px;font-weight:700">${p.username||p.email}</span>
      <span class="lb-badge ${alive?'alive':'dead'}">${alive?'Alive':'Out'}</span>
      ${alive?`<button class="btn-elim" onclick="eliminatePlayer('${p.id}')">Eliminate</button>`:`<button class="btn-revive" onclick="revivePlayer('${p.id}')">Revive</button>`}
    </div>`
  })
  html+='</div>'
  document.getElementById('admin-players-list').innerHTML=html
}

async function adminOpenWeek(){
  const wk=document.getElementById('admin-week-num').value
  const dl=document.getElementById('admin-deadline').value
  if(!wk) return toast('Select a week','error')
  await sb.from('weeks').upsert({week_number:parseInt(wk),status:'open',deadline:dl||null},{onConflict:'week_number'})
  await loadCurrentWeek(); toast(`✅ Week ${wk} opened`)
}

async function adminCloseWeek(){
  const wk=document.getElementById('admin-week-num').value
  if(!wk) return toast('Select a week','error')
  await sb.from('weeks').upsert({week_number:parseInt(wk),status:'closed'},{onConflict:'week_number'})
  toast(`🔒 Week ${wk} closed`)
}

async function fetchNFLResults(){
  const wk=document.getElementById('admin-results-week').value
  if(!wk) return toast('Select a week','error')
  const list=document.getElementById('results-list')
  list.innerHTML='<div class="loader"><div class="spinner"></div></div>'
  try{
    const res=await fetch(`${ESPN}?seasontype=2&week=${wk}`)
    const json=await res.json()
    liveResults={}
    let html=''
    for(const ev of (json.events||[])){
      const c=ev.competitions?.[0]; if(!c) continue
      const home=c.competitors.find(t=>t.homeAway==='home')
      const away=c.competitors.find(t=>t.homeAway==='away')
      const done=c.status?.type?.completed
      const hA=home.team.abbreviation, aA=away.team.abbreviation
      const hS=parseInt(home.score||0), aS=parseInt(away.score||0)
      if(done){ const tied=hS===aS; liveResults[hA]=tied||hS>aS?'win':'loss'; liveResults[aA]=tied||aS>hS?'win':'loss' }
      const winner=done?(hS>aS?hA:aA):null
      html+=`<div class="result-row">
        <span style="font-weight:800;font-size:12px">${aA} @ ${hA}</span>
        <span style="font-size:11px;color:#6b7280">${done?`${aS}–${hS}`:'Pending'}</span>
        ${done?`<span class="lb-badge alive" style="font-size:10px">✅ ${winner}</span>`:`<span style="font-size:10px;color:#9ca3af">–</span>`}
      </div>`
    }
    list.innerHTML=html||'<div class="empty"><div class="empty-txt">No games</div></div>'
  }catch(e){ list.innerHTML='<div class="empty"><div class="empty-txt">Error loading</div></div>' }
}

async function processEliminations(){
  const wk=document.getElementById('admin-results-week').value
  if(!wk||!Object.keys(liveResults).length) return toast('Fetch results first','error')
  const {data:picks} = await sb.from('picks').select('*').eq('week_number',parseInt(wk))
  if(!picks?.length) return toast('No picks this week','error')
  let count=0
  for(const pick of picks){
    const result=liveResults[pick.team_abbr]; if(!result) continue
    await sb.from('picks').update({result}).eq('id',pick.id)
    if(result==='loss') await sb.from('profiles').update({status:'eliminated'}).eq('id',pick.player_id)
    count++
  }
  toast(`⚡ ${count} picks processed`); loadAdminPage()
}

async function revivePlayer(id){ await sb.from('profiles').update({status:'alive'}).eq('id',id); toast('✅ Revived'); loadAdminPage() }
async function eliminatePlayer(id){ await sb.from('profiles').update({status:'eliminated'}).eq('id',id); toast('Eliminated'); loadAdminPage() }

let toastTimer
function toast(msg, type='success'){
  const t=document.getElementById('toast')
  t.textContent=msg; t.className='show '+type
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='',3000)
}
</script>
